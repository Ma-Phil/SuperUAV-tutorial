<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>基础动力与供电链路</title>
  <style>
    :root {
      --bg: #f4f1ea;
      --paper: #fffdf8;
      --ink: #172126;
      --muted: #647070;
      --line: #ced7d6;
      --accent: #ff6b35;
      --red: #e4342d;
      --black: #1e2528;
      --phase-a: #c47b1d;
      --phase-b: #20795d;
      --phase-c: #2457a6;
      --orange: #ef7d22;
      --shadow: 0 18px 46px rgba(25, 31, 34, 0.14);
      color-scheme: light;
      font-family: "Microsoft YaHei", "Noto Sans CJK SC", "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-width: 320px;
      color: var(--ink);
      background:
        linear-gradient(90deg, rgba(23, 33, 38, 0.04) 1px, transparent 1px),
        linear-gradient(rgba(23, 33, 38, 0.04) 1px, transparent 1px),
        var(--bg);
      background-size: 28px 28px;
    }

    a {
      color: inherit;
    }

    .shell {
      max-width: 1440px;
      margin: 0 auto;
      padding: 20px;
    }

    .topbar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: end;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0;
      font-size: clamp(24px, 3vw, 42px);
      line-height: 1.05;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 8px 0 0;
      max-width: 780px;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.65;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
    }

    .step-button {
      min-height: 36px;
      border: 1px solid #bfc9c7;
      border-radius: 999px;
      padding: 7px 13px;
      color: #223033;
      background: rgba(255, 253, 248, 0.9);
      cursor: pointer;
      font: inherit;
      font-size: 13px;
      transition: background 160ms ease, border-color 160ms ease, transform 160ms ease;
    }

    .step-button:hover,
    .step-button:focus-visible {
      border-color: var(--accent);
      outline: none;
      transform: translateY(-1px);
    }

    .step-button.is-active {
      border-color: #172126;
      color: #fff;
      background: #172126;
    }

    .board {
      position: relative;
      overflow: auto;
      border: 1px solid #cbd4d2;
      border-radius: 8px;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.82), rgba(255, 248, 236, 0.88)),
        var(--paper);
      box-shadow: var(--shadow);
    }

    .stage {
      position: relative;
      width: 100%;
      max-width: 1400px;
      min-width: 960px;
      aspect-ratio: 1400 / 780;
    }

    .wires {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 5;
      pointer-events: none;
    }

    .wire {
      opacity: 0.18;
      transition: opacity 180ms ease, filter 180ms ease;
    }

    .wire.is-visible {
      opacity: 1;
      filter: drop-shadow(0 7px 12px rgba(25, 31, 34, 0.24));
    }

    .wire path {
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .wire-link {
      pointer-events: auto;
    }

    .wire-label {
      pointer-events: auto;
      paint-order: stroke;
      stroke: rgba(255, 253, 248, 0.92);
      stroke-width: 7px;
      stroke-linejoin: round;
      fill: #172126;
      font-size: 23px;
      font-weight: 700;
    }

    .wire-note {
      paint-order: stroke;
      stroke: rgba(255, 253, 248, 0.92);
      stroke-width: 6px;
      fill: #4b5759;
      font-size: 18px;
      font-weight: 600;
    }

    .part {
      position: absolute;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 8px;
      border: 1px solid #cdd8d6;
      border-radius: 8px;
      padding: 10px;
      background: rgba(255, 253, 248, 0.96);
      box-shadow: 0 10px 28px rgba(21, 28, 31, 0.14);
      transition: border-color 180ms ease, box-shadow 180ms ease, transform 180ms ease;
    }

    .part.is-active {
      border-color: var(--accent);
      box-shadow: 0 16px 34px rgba(255, 107, 53, 0.24);
      transform: translateY(-2px);
    }

    .part img {
      display: block;
      width: 100%;
      height: clamp(112px, 10.5vw, 148px);
      object-fit: contain;
      border-radius: 6px;
      background: #fff;
    }

    .part-name {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      color: var(--ink);
      font-size: 15px;
      font-weight: 800;
      line-height: 1.2;
    }

    .part-name span {
      min-width: 0;
    }

    .doc-link {
      flex: 0 0 auto;
      border-bottom: 2px solid rgba(255, 107, 53, 0.65);
      color: #8c3d13;
      font-size: 12px;
      font-weight: 700;
      text-decoration: none;
      white-space: nowrap;
    }

    .pin {
      position: absolute;
      z-index: 20;
      width: 13px;
      height: 13px;
      border: 2px solid #fff;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 3px rgba(255, 107, 53, 0.28);
    }

    .legend {
      position: absolute;
      right: 18px;
      bottom: 16px;
      z-index: 12;
      display: grid;
      gap: 7px;
      width: min(330px, calc(100% - 36px));
      border: 1px solid #ccd6d4;
      border-radius: 8px;
      padding: 12px;
      background: rgba(255, 253, 248, 0.94);
      color: #263234;
      font-size: 13px;
      line-height: 1.45;
    }

    .legend strong {
      font-size: 14px;
    }

    .legend-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .swatch {
      width: 24px;
      height: 4px;
      border-radius: 999px;
      background: var(--red);
    }

    .swatch.black { background: var(--black); }
    .swatch.phase { background: linear-gradient(90deg, var(--phase-a), var(--phase-b), var(--phase-c)); }
    .swatch.orange { background: var(--orange); }

    .battery { left: 4.8%; top: 14%; width: 20%; }
    .esc { left: 39.8%; top: 10.5%; width: 18%; }
    .motor { left: 75%; top: 13%; width: 18%; }
    .stepdown { left: 37%; top: 64%; width: 21%; }
    .flight-controller { left: 73%; top: 63%; width: 16.5%; }

    .pin.battery-out { left: 23.9%; top: 24.6%; }
    .pin.esc-in { left: 39.4%; top: 23.7%; }
    .pin.esc-out { left: 58%; top: 23.6%; }
    .pin.motor-in { left: 74.3%; top: 23.6%; }
    .pin.battery-down { left: 18%; top: 42%; }
    .pin.stepdown-in { left: 37%; top: 79%; }
    .pin.stepdown-out { left: 57.5%; top: 79.6%; }
    .pin.fc-in { left: 72.1%; top: 79.7%; }

    @media (max-width: 900px) {
      .shell {
        padding: 14px;
      }

      .topbar {
        grid-template-columns: 1fr;
        align-items: start;
      }

      .controls {
        justify-content: flex-start;
      }


    }

    @media (max-width: 560px) {
      .step-button {
        padding-inline: 10px;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div>
        <h1>基础动力与供电链路</h1>
        <p class="subtitle">按步骤查看电池、电调、电机、5V 降压模块和飞控之间的模块级连接。真实装机前请核对焊盘丝印、额定电压和厂家说明书。</p>
      </div>
      <nav class="controls" aria-label="接线步骤">
        <button class="step-button is-active" type="button" data-filter="all">全部</button>
        <button class="step-button" type="button" data-filter="1">1 电池到电调</button>
        <button class="step-button" type="button" data-filter="2">2 电调到电机</button>
        <button class="step-button" type="button" data-filter="3">3 电池到 5V 降压</button>
        <button class="step-button" type="button" data-filter="4">4 5V 到飞控</button>
      </nav>
    </header>

    <section class="board" aria-label="无人机基础接线示意图">
      <div class="stage">
      <svg class="wires" viewBox="0 0 1400 780" preserveAspectRatio="xMidYMid meet" aria-hidden="true">
        <defs>
          <marker id="arrow-red" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#e4342d"></path>
          </marker>
          <marker id="arrow-black" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#1e2528"></path>
          </marker>
          <marker id="arrow-orange" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#ef7d22"></path>
          </marker>
          <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#2457a6"></path>
          </marker>
        </defs>

        <a class="wire-link" href="../../wiring/basic-power-chain.html" data-source-href="../../wiring/basic-power-chain.md" target="_top" aria-label="查看电池到电调接线说明">
          <g class="wire is-visible" data-step="1" data-parts="battery esc">
            <path d="M 346 155 C 420 130, 485 130, 557 155" stroke="#e4342d" stroke-width="9" marker-end="url(#arrow-red)"></path>
            <path d="M 346 220 C 420 250, 485 250, 557 220" stroke="#1e2528" stroke-width="9" marker-end="url(#arrow-black)"></path>
            <text class="wire-label" x="404" y="126">1 主电源输入</text>
            <text class="wire-note" x="420" y="278">红线接正极，黑线接负极</text>
          </g>
        </a>

        <a class="wire-link" href="../../wiring/basic-power-chain.html" data-source-href="../../wiring/basic-power-chain.md" target="_top" aria-label="查看电调到电机接线说明">
          <g class="wire is-visible" data-step="2" data-parts="esc motor">
            <path d="M 810 145 C 895 116, 970 116, 1050 145" stroke="#c47b1d" stroke-width="7" marker-end="url(#arrow-blue)"></path>
            <path d="M 810 184 C 895 184, 970 184, 1050 184" stroke="#20795d" stroke-width="7" marker-end="url(#arrow-blue)"></path>
            <path d="M 810 224 C 895 252, 970 252, 1050 224" stroke="#2457a6" stroke-width="7" marker-end="url(#arrow-blue)"></path>
            <text class="wire-label" x="858" y="110">2 电机三相线</text>
            <text class="wire-note" x="870" y="276">转向不对时再调整相序或参数</text>
          </g>
        </a>

        <a class="wire-link" href="../../wiring/basic-power-chain.html" data-source-href="../../wiring/basic-power-chain.md" target="_top" aria-label="查看电池到 5V 降压接线说明">
          <g class="wire is-visible" data-step="3" data-parts="battery stepdown">
            <path d="M 260 325 C 295 470, 395 560, 518 590" stroke="#e4342d" stroke-width="8" marker-end="url(#arrow-red)"></path>
            <path d="M 220 328 C 250 506, 388 628, 518 642" stroke="#1e2528" stroke-width="8" marker-end="url(#arrow-black)"></path>
            <text class="wire-label" x="260" y="492">3 降压输入</text>
            <text class="wire-note" x="286" y="536">从电池取电，进入降压模块</text>
          </g>
        </a>

        <a class="wire-link" href="../../wiring/basic-power-chain.html" data-source-href="../../wiring/basic-power-chain.md" target="_top" aria-label="查看 5V 降压到飞控接线说明">
          <g class="wire is-visible" data-step="4" data-parts="stepdown flight-controller">
            <path d="M 812 596 C 878 560, 940 560, 1022 596" stroke="#ef7d22" stroke-width="8" marker-end="url(#arrow-orange)"></path>
            <path d="M 812 646 C 878 682, 940 682, 1022 648" stroke="#1e2528" stroke-width="8" marker-end="url(#arrow-black)"></path>
            <text class="wire-label" x="842" y="540">4 5V / GND</text>
            <text class="wire-note" x="848" y="718">接飞控前先测量输出电压</text>
          </g>
        </a>
      </svg>

      <article class="part battery" data-part="battery" data-steps="1 3">
        <img src="../photos/battery-6s.png" alt="6S 电池照片">
        <div class="part-name">
          <span>6S 电池</span>
          <a class="doc-link" href="../../parts/battery.html" data-source-href="../../parts/battery.md" target="_top">说明</a>
        </div>
      </article>

      <article class="part esc" data-part="esc" data-steps="1 2">
        <img src="../photos/esc-f60a-mini-4in1-front.png" alt="F60A MINI 4IN1 电调照片">
        <div class="part-name">
          <span>4 合 1 电调</span>
          <a class="doc-link" href="../../parts/esc.html" data-source-href="../../parts/esc.md" target="_top">说明</a>
        </div>
      </article>

      <article class="part motor" data-part="motor" data-steps="2">
        <img src="../photos/motor-f90-kv1300.png" alt="F90 电机 KV1300 照片">
        <div class="part-name">
          <span>F90 电机</span>
          <a class="doc-link" href="../../parts/motor.html" data-source-href="../../parts/motor.md" target="_top">说明</a>
        </div>
      </article>

      <article class="part stepdown" data-part="stepdown" data-steps="3 4">
        <img src="../photos/stepdown-5v-front.png" alt="5V 降压模块照片">
        <div class="part-name">
          <span>5V 降压模块</span>
          <a class="doc-link" href="../../parts/stepdown-5v.html" data-source-href="../../parts/stepdown-5v.md" target="_top">说明</a>
        </div>
      </article>

      <article class="part flight-controller" data-part="flight-controller" data-steps="4">
        <img src="../photos/flight-controller-front.png" alt="飞控照片">
        <div class="part-name">
          <span>飞控</span>
          <a class="doc-link" href="../../parts/flight-controller.html" data-source-href="../../parts/flight-controller.md" target="_top">说明</a>
        </div>
      </article>

      <span class="pin battery-out" aria-hidden="true"></span>
      <span class="pin esc-in" aria-hidden="true"></span>
      <span class="pin esc-out" aria-hidden="true"></span>
      <span class="pin motor-in" aria-hidden="true"></span>
      <span class="pin battery-down" aria-hidden="true"></span>
      <span class="pin stepdown-in" aria-hidden="true"></span>
      <span class="pin stepdown-out" aria-hidden="true"></span>
      <span class="pin fc-in" aria-hidden="true"></span>

      <aside class="legend" aria-label="线束图例">
        <strong>线束图例</strong>
        <div class="legend-row"><span class="swatch"></span><span>红色：正极或 5V 正电源</span></div>
        <div class="legend-row"><span class="swatch black"></span><span>黑色：GND / 负极</span></div>
        <div class="legend-row"><span class="swatch phase"></span><span>三色：电调到电机三相线</span></div>
        <div class="legend-row"><span class="swatch orange"></span><span>橙色：5V 输出到飞控</span></div>
      </aside>
      </div>
    </section>
  </main>

  <script>
    const buttons = Array.from(document.querySelectorAll(".step-button"));
    const wires = Array.from(document.querySelectorAll(".wire"));
    const parts = Array.from(document.querySelectorAll(".part"));
    const sourcePath = window.location.pathname.replace(/\\/g, "/");
    const sourceMode = window.location.protocol === "file:" && sourcePath.includes("/docs/assets/diagrams/");

    document.querySelectorAll("[data-source-href]").forEach((link) => {
      if (sourceMode) {
        link.setAttribute("href", link.dataset.sourceHref);
      }
    });

    function applyFilter(filter) {
      buttons.forEach((button) => {
        button.classList.toggle("is-active", button.dataset.filter === filter);
      });

      wires.forEach((wire) => {
        wire.classList.toggle("is-visible", filter === "all" || wire.dataset.step === filter);
      });

      parts.forEach((part) => {
        const steps = part.dataset.steps.split(" ");
        part.classList.toggle("is-active", filter === "all" || steps.includes(filter));
      });
    }

    buttons.forEach((button) => {
      button.addEventListener("click", () => applyFilter(button.dataset.filter));
    });

    applyFilter("all");
  </script>
</body>
</html>
